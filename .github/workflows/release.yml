name: Release

# Release pipeline — triggers when a `v*` tag lands on the repo. Two stages:
#   1) build matrix (macOS + Windows) only builds bundles and uploads them as
#      workflow artifacts. tauri-action runs with no `tagName`, so it does NOT
#      try to create / update a GitHub release itself.
#   2) publish job downloads all artifacts and creates a single, published
#      (not draft) release via softprops/action-gh-release, with auto-generated
#      release notes (PRs since the previous tag) + a fixed "Downloads" intro.
#
# Use `npm run release` locally to bump the version in package.json /
# tauri.conf.json / Cargo.toml, commit, tag, and push in one go; the pushed
# tag fires this workflow. `workflow_dispatch` is left in for emergency
# re-runs from the Actions UI — when triggered manually (no tag) only the
# build job runs; the publish job is skipped via the `if: tag` guard.
#
# Tauri cross-compile from macOS to a Windows installer isn't practical
# locally because NSIS/WiX bundling needs a Windows toolchain, so the
# Windows artifacts are produced on a `windows-latest` runner here. Linux
# bundles (.deb / .AppImage) come from an `ubuntu-22.04` runner; we pin
# 22.04 instead of `ubuntu-latest` so the resulting binary links against
# an older glibc and runs on a wider range of distros.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Multiple tag pushes on the same ref shouldn't fight over the release.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets; harmless to list on Windows
          # because the action only installs targets it recognizes for the host.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        # Tauri 2 on Linux needs webkit2gtk-4.1 + glib/gtk dev headers; the rest
        # (patchelf, libxdo, librsvg) are used by the .deb / .AppImage bundlers.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        # No `tagName` here on purpose — without it, tauri-action only builds
        # and never touches the GitHub release. The `publish` job handles that.
        with:
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ matrix.platform }}
          # macOS universal builds land under `target/universal-apple-darwin/release/bundle/`;
          # Windows + Linux builds land under `target/release/bundle/`. Glob covers all.
          # Linux: .deb (Debian/Ubuntu) + .AppImage (portable). We don't ship .rpm —
          # rpmbuild isn't preinstalled on ubuntu-22.04 and adding it slows the job
          # without serving a clear audience; AppImage covers RPM-based distros too.
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: error

  publish:
    needs: build
    # Only publish for tag pushes. `workflow_dispatch` runs build-only.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Published, not draft — set draft: true if you want to review on
          # GitHub before users see it.
          draft: false
          prerelease: false
          # GitHub auto-generates "What's Changed" + "New Contributors" from
          # PRs (or direct commits) since the previous v* tag. Appended after
          # the `body` block below.
          generate_release_notes: true
          files: dist/**/*
          body: |
            ## Downloads

            - **macOS (Apple Silicon + Intel)** — `ai-sessions-viewer_*_universal.dmg`
            - **Windows x64** — `ai-sessions-viewer_*_x64-setup.exe` / `*_x64_en-US.msi`
            - **Linux x86_64** — `ai-sessions-viewer_*_amd64.deb` (Debian/Ubuntu) / `ai-sessions-viewer_*_amd64.AppImage` (portable)

            On macOS first launch the unsigned `.app` may prompt — right-click → **Open** to bypass Gatekeeper.
            On Linux the `.AppImage` needs `chmod +x` before running; the `.deb` installs with `sudo apt install ./ai-sessions-viewer_*_amd64.deb`.

            ## 更新日志（中文）

            - 新增 macOS 菜单栏托盘与关闭到托盘，窗口可从托盘菜单恢复。
            - 新增导出历史与无损 JSON 导出，已导出的原始会话可快速重新打开。
            - 新增实时模型价格页面，统计默认查看最近 6 个月，并改进模型价格准确性。
            - 聊天与 HTML 导出支持 Markdown 表格、Mermaid、JSON 高亮、diff 高亮和 URL 自动链接。
            - 设置页改为 General / Advanced 分组，保留 Warp / Terminal.app / iTerm2 终端选择。

            ## Changelog (English)

            - Added macOS tray support and close-to-tray window behavior.
            - Added export history and lossless JSON export for reopening original sessions.
            - Added live model pricing, a six-month default stats range, and improved pricing accuracy.
            - Added Markdown tables, Mermaid, JSON highlighting, diff highlighting, and URL linkification in chat and HTML export.
            - Redesigned Settings into General / Advanced tabs while preserving Warp / Terminal.app / iTerm2 selection.

            Full version history → [`CHANGELOG.md`](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.AI_SESSIONS_VIEWER_PAT }}
